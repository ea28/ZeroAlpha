[runtime]
mode = "live"
timezone = "UTC"
data_root = "data"
artifact_root = "artifacts"
kill_switch_file = ".zeroalpha/kill_switch.enabled"
enable_live_trading = true
live_confirmation = "ZEROALPHA_LIVE"

[broker]
host = "127.0.0.1"
port = 4001
client_id = 701
account = ""
read_only = true
allow_custom_port = false
market_data_type = "live"
crypto_exchanges = ["PAXOS", "ZEROHASH"]

[contract]
symbol = "BTC"
security_type = "CRYPTO"
currency = "USD"
instrument_model = "spot_crypto"

[cost]
tier_rate = 0.0018
minimum_commission = 1.75
maximum_commission_rate = 0.01
base_slippage_bps = 5.0
safety_margin_bps = 10.0

[execution]
entry_order_type = "LMT"
normal_exit_order_type = "LMT"
urgent_exit_order_type = "MKT"
entry_timeout_seconds = 300
exit_timeout_seconds = 300
max_cancel_replace_per_signal = 3
simulated_latency_seconds = 0.0
limit_trade_through_bps = 0.0
limit_fill_probability = 1.0
partial_fill_fraction = 1.0

[risk]
account_equity = 10000.0
risk_per_trade = 0.0035
paper_max_notional = 10000.0
live_max_notional = 5000.0
daily_loss_stop = 0.01
weekly_loss_stop = 0.03
rolling_drawdown_stop = 0.08
max_open_positions = 1
minimum_fee_efficient_notional = 1000.0
max_spread_bps = 75.0
max_quote_age_ms = 5000
consecutive_loss_limit = 3
cooldown_hours_after_stopouts = 24

[labels]
bar_size = "1h"
max_holding_hours = 72
net_profit_target = 0.02
net_stop_loss = 0.02
conservative_same_bar = true
volatility_lookback_bars = 240
profit_volatility_multiplier = 0.0
stop_volatility_multiplier = 0.0
minimum_gross_profit_bps = 0.0
minimum_gross_stop_bps = 0.0

[model]
minimum_probability = 0.60
minimum_expected_value = 0.0
calibration_method = "sigmoid"
feature_set_version = "v1"
label_version = "v1"

[kronos]
enabled = false
mode = "proxy"
lookback_bars = 512
embedding_dims = 12
official_model_name = "NeoQuasar/Kronos-small"
official_tokenizer_name = "NeoQuasar/Kronos-Tokenizer-base"
device = "cpu"
hidden_pool_tail = 64
